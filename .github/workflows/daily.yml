name: Actualizar reporte SIAN

on:
  schedule:
    # 15:00 UTC = 10:00 AM hora de Cancún (America/Cancun, UTC-5, sin horario de verano)
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install psycopg2-binary

      - name: Generar data.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python generate.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Sin cambios en data.json"
          else
            git commit -m "Actualizar datos $(TZ=America/Cancun date +'%Y-%m-%d %H:%M')"
            git push
          fi
